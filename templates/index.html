<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.8s ease-in-out;
        }

        h1 {
            font-weight: 600;
            color: #4a4a4a;
        }

        .search-box {
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: #a5b4fc;
            box-shadow: 0 0 0 3px rgba(165, 180, 252, 0.2);
        }

        .btn-custom {
            background: #818cf8;
            color: white;
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background: #a5b4fc ;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .link-profile {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #7c83fd;
            text-decoration: none;
            transition: 0.2s;
        }

        .link-profile:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<div class="card-custom">

    <h1>Find Your Next Job</h1>
    <p class="subtitle">AI-powered job search & recommendations</p>

    <form action="/search" method="post">
        <input 
            type="text" 
            name="query" 
            class="form-control search-box" 
            placeholder="e.g. Machine Learning Engineer" 
            required
        >

        <button class="btn btn-custom w-100 mt-3">
            Search Jobs
        </button>
    </form>

    <a href="/profile" class="link-profile">
        Upload Resume & View Profile →
    </a>

</div>

</body>
</html>
