<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job AI Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #eef2f7);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .search-box {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .input-group .form-control {
            padding: 15px;
            font-size: 1rem;
        }

        .input-group .btn {
            min-width: 160px;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }

        .btn-outline-success {
            border: 1px solid #198754;
        }

        .btn:hover {
            transform: translateY(-1px);
            transition: 0.2s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="main-container">

    <!-- Title -->
    <div class="title">
        <i class="bi bi-briefcase-fill text-primary"></i>
        Job AI Platform
    </div>

    <div class="subtitle">
        Find the best jobs and analyse skill demand using AI
    </div>

    <!-- Form -->
    <form method="post" id="mainForm">

        <div class="input-group input-group-lg search-box">

            <!-- Input -->
            <input 
                type="text" 
                name="query" 
                id="queryInput"
                class="form-control"
                placeholder="Search jobs or analyse a role (e.g. Data Scientist, AWS Engineer)" 
                required
            >

            <!-- Search Button -->
            <button 
                type="submit" 
                class="btn btn-primary"
                onclick="setAction('/search')"
            >
                <i class="bi bi-search"></i> Search Jobs
            </button>

            <!-- Analyse Button -->
            <button 
                type="submit" 
                class="btn btn-outline-success"
                onclick="setAction('/title_summary')"
            >
                <i class="bi bi-bar-chart"></i> Analyse Job Title
            </button>

        </div>

    </form>

</div>

<!-- JS -->
<script>
function setAction(actionUrl) {
    document.getElementById("mainForm").action = actionUrl;
}
</script>

</body>
</html>
