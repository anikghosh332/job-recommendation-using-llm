<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Fit</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #eef2f7);
        }

        .fit-container {
            max-width: 950px;
            margin: 40px auto;
        }

        .fit-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            background: white;
            animation: fadeInUp 0.6s ease;
        }

        .job-title {
            font-weight: 700;
            font-size: 1.8rem;
        }

        .company {
            color: #6c757d;
            font-size: 1.1rem;
        }

        .section-title {
            margin-top: 30px;
            font-weight: 600;
            font-size: 1.3rem;
        }

        /* Rendered explanation */
        .explanation-rendered {
            margin-top: 15px;
            line-height: 1.7;
            font-size: 0.95rem;
            animation: fadeIn 0.6s ease;
        }

        /* Headings */
        .explanation-rendered h2 {
            margin-top: 25px;
            font-size: 1.3rem;
            font-weight: 600;
            border-left: 4px solid #0d6efd;
            padding-left: 10px;
        }

        .explanation-rendered h3 {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Tables */
        .explanation-rendered table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        .explanation-rendered th {
            background-color: #0d6efd;
            color: white;
            padding: 10px;
            font-size: 0.85rem;
        }

        .explanation-rendered td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }

        .explanation-rendered tr:hover {
            background-color: #f8f9fa;
        }

        /* Bold text */
        .explanation-rendered strong {
            color: #0d6efd;
        }

        /* Lists */
        .explanation-rendered ul {
            margin-top: 10px;
        }

        .explanation-rendered li {
            margin-bottom: 5px;
        }

        /* Divider */
        .explanation-rendered hr {
            margin: 25px 0;
        }

        /* Back button */
        .back-btn {
            margin-top: 30px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Hover effect */
        .fit-card:hover {
            transform: translateY(-3px);
            transition: 0.3s ease;
        }
    </style>
</head>

<body>

<div class="fit-container">

    <div class="fit-card">

        <!-- Header -->
        <div class="d-flex align-items-center mb-3">
            <i class="bi bi-person-check-fill text-success me-2" style="font-size: 1.5rem;"></i>
            <div>
                <div class="job-title">{{ job.title }}</div>
                <div class="company">{{ job.company }}</div>
            </div>
        </div>

        <!-- Section Title -->
        <div class="section-title">
            <i class="bi bi-stars text-warning"></i> Matching Insights
        </div>

        <!-- Explanation -->
        <div class="explanation-rendered">
            {{ explanation | safe }}
        </div>

        <!-- Back Button -->
        <div class="back-btn">
            <a href="/" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Back to Search
            </a>
        </div>

    </div>

</div>

</body>
</html>
