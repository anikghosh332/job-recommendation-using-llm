<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Fit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --p900: #2e1065;
            --p800: #4c1d95;
            --p700: #6d28d9;
            --p600: #7c3aed;
            --p500: #8b5cf6;
            --p400: #a78bfa;
            --p200: #ddd6fe;
            --p100: #ede9fe;
            --p50:  #f5f3ff;
            --ink:  #1e1b4b;
            --sub:  #6b7280;
            --border: #e5e7eb;
            --white: #ffffff;
            --bg: #f7f5ff;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 1px 1px, rgba(139,92,246,0.10) 1px, transparent 0);
            background-size: 30px 30px;
            color: var(--ink);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Ambient blobs */
        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .amb-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.18;
        }
        .amb-1 { width:640px;height:640px;background:#8b5cf6;top:-200px;right:-160px; }
        .amb-2 { width:480px;height:480px;background:#a78bfa;bottom:-150px;left:-120px; }

        /* ── Topbar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(247,245,255,0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(167,139,250,0.18);
            padding: 16px 0;
        }
        .topbar-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .brand-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--p700), var(--p500));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            font-size: 1rem;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            color: var(--ink);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--p700);
            background: white;
            border: 1.5px solid var(--p200);
            border-radius: 10px;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s, transform 0.12s;
        }
        .btn-back:hover {
            background: var(--p50);
            border-color: var(--p400);
            transform: translateY(-1px);
            color: var(--p700);
        }

        /* ── Content ── */
        .content-wrap {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 44px 28px 0;
        }

        /* ── Job hero ── */
        .job-hero {
            background: var(--white);
            border: 1px solid rgba(167,139,250,0.22);
            border-radius: 20px;
            padding: 30px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(109,40,217,0.07);
            animation: fadeUp 0.5s ease both;
        }

        .co-avatar {
            width: 58px; height: 58px;
            border-radius: 14px;
            background: var(--p100);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--p700);
            flex-shrink: 0;
            border: 1px solid var(--p200);
        }

        .hero-text { flex: 1; min-width: 0; }

        .hero-eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--p500);
            margin-bottom: 4px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 3vw, 2rem);
            color: var(--ink);
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .hero-company {
            font-size: 0.9rem;
            color: var(--sub);
            font-weight: 500;
        }
        .hero-company strong { color: #374151; font-weight: 600; }

        .fit-badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, var(--p700), var(--p500));
            color: white;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            box-shadow: 0 3px 14px rgba(109,40,217,0.28);
        }
        .fit-badge i { font-size: 0.9rem; }

        /* ── Insights card ── */
        .insights-card {
            background: var(--white);
            border: 1px solid rgba(167,139,250,0.22);
            border-radius: 20px;
            padding: 32px 36px;
            box-shadow: 0 4px 24px rgba(109,40,217,0.07);
            animation: fadeUp 0.5s 0.12s ease both;
        }

        .insights-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--p100);
        }
        .insights-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: var(--p100);
            display: flex; align-items: center; justify-content: center;
            color: var(--p600);
            font-size: 1.1rem;
        }
        .insights-heading {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--ink);
        }

        /* ── Rendered explanation content ── */
        .explanation-rendered {
            font-size: 0.925rem;
            line-height: 1.75;
            color: #374151;
        }

        .explanation-rendered h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--ink);
            margin: 28px 0 10px;
            padding-left: 14px;
            border-left: 3px solid var(--p500);
        }

        .explanation-rendered h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--p700);
            margin: 22px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .explanation-rendered p {
            margin-bottom: 12px;
        }

        .explanation-rendered strong {
            color: var(--p700);
            font-weight: 600;
        }

        .explanation-rendered ul,
        .explanation-rendered ol {
            padding-left: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 14px;
        }

        .explanation-rendered ul li,
        .explanation-rendered ol li {
            font-size: 0.9rem;
            color: #4b5563;
            padding-left: 20px;
            position: relative;
            line-height: 1.6;
        }
        .explanation-rendered ul li::before {
            content: '';
            position: absolute;
            left: 0; top: 8px;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--p400);
        }
        .explanation-rendered ol {
            counter-reset: item;
        }
        .explanation-rendered ol li {
            counter-increment: item;
        }
        .explanation-rendered ol li::before {
            content: counter(item);
            position: absolute;
            left: 0; top: 1px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--p600);
        }

        .explanation-rendered hr {
            border: none;
            border-top: 1px solid var(--p100);
            margin: 26px 0;
        }

        /* Table */
        .explanation-rendered table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            margin: 16px 0;
            font-size: 0.85rem;
            box-shadow: 0 0 0 1px var(--p100);
        }
        .explanation-rendered th {
            background: linear-gradient(135deg, var(--p700), var(--p500));
            color: white;
            padding: 11px 16px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-align: left;
        }
        .explanation-rendered td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--p50);
            color: #4b5563;
            vertical-align: top;
        }
        .explanation-rendered tr:last-child td { border-bottom: none; }
        .explanation-rendered tr:hover td { background: var(--p50); }

        /* ── Bottom back link ── */
        .bottom-back {
            margin-top: 28px;
            animation: fadeUp 0.5s 0.2s ease both;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .topbar-inner { padding: 0 16px; }
            .content-wrap { padding: 28px 16px 0; }
            .job-hero { flex-direction: column; align-items: flex-start; gap: 14px; padding: 22px 20px; }
            .insights-card { padding: 24px 20px; }
            .fit-badge { align-self: flex-start; }
        }
    </style>
</head>

<body>

<!-- Ambient background -->
<div class="ambient">
    <div class="amb-blob amb-1"></div>
    <div class="amb-blob amb-2"></div>
</div>

<!-- Sticky topbar -->
<nav class="topbar">
    <div class="topbar-inner">
        <a href="/" class="brand">
            <div class="brand-icon"><i class="bi bi-briefcase-fill"></i></div>
            <span class="brand-name">Job AI</span>
        </a>
        <a href="/" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back to Search
        </a>
    </div>
</nav>

<!-- Content -->
<div class="content-wrap">

    <!-- Job hero -->
    <div class="job-hero">
        <div class="co-avatar">{{ job.company[0] | upper }}</div>
        <div class="hero-text">
            <div class="hero-eyebrow">Fit Analysis</div>
            <div class="hero-title">{{ job.title }}</div>
            <div class="hero-company">
                <strong>{{ job.company }}</strong>
            </div>
        </div>
        <div class="fit-badge">
            <i class="bi bi-stars"></i>
            Matching Insights
        </div>
    </div>

    <!-- Insights card -->
    <div class="insights-card">
        <div class="insights-header">
            <div class="insights-icon">
                <i class="bi bi-person-check-fill"></i>
            </div>
            <div class="insights-heading">Your Match Breakdown</div>
        </div>

        <div class="explanation-rendered">
            {{ explanation | safe }}
        </div>
    </div>

    <!-- Back -->
    <div class="bottom-back">
        <a href="/" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back to Search
        </a>
    </div>

</div>

</body>
</html>
