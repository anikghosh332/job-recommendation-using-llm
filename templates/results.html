<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
        }

        .header {
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-in-out;
        }

        .job-card {
            border-radius: 16px;
            border: none;
            background: #ffffff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            transition: all 0.25s ease;
            animation: fadeUp 0.5s ease;
        }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .job-title {
            font-weight: 600;
            color: #4a4a4a;
        }

        .company {
            color: #7c83fd;
            font-weight: 500;
        }

        .description {
            color: #666;
            font-size: 14px;
        }

        .btn-soft {
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-fit {
            background: #c7d2fe;
            border: none;
        }

        .btn-fit:hover {
            background: #a5b4fc;
        }

        .btn-skill {
            background: #fecaca;
            border: none;
        }

        .btn-skill:hover {
            background: #fca5a5;
        }

        .btn-recommend {
            background: #a5b4fc;
            color: white;
            border-radius: 12px;
            padding: 10px 18px;
            transition: 0.3s;
        }

        .btn-recommend:hover {
            background: #818cf8;
            transform: translateY(-2px);
        }

        .badge-soft {
            background: #eef2ff;
            color: #6366f1;
            font-size: 12px;
            border-radius: 8px;
            padding: 5px 8px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0 }
            to { opacity: 1 }
        }
    </style>
</head>

<body class="container mt-5">

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h3>Results for "<span style="color:#6366f1">{{ query }}</span>"</h3>
        {% if recommended %}
            <span class="badge-soft">AI Recommended Ranking</span>
        {% endif %}
    </div>

    <form action="/recommend" method="post">
        <input type="hidden" name="query" value="{{ query }}">
        <button class="btn btn-recommend">
            <i class="bi bi-stars"></i> Show Recommended
        </button>
    </form>
</div>

<hr>

<!-- JOB LIST -->
{% for job in jobs %}
<div class="card job-card mb-4 p-4">

    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h5 class="job-title">{{ job.title }}</h5>
            <div class="company">
                <i class="bi bi-building"></i> {{ job.company }}
            </div>
        </div>

        {% if job.score %}
            <span class="badge-soft">
                Match: {{ (job.score * 100) | round(1) }}%
            </span>
        {% endif %}
    </div>

    <p class="description mt-3">
        {{ job.job_description[:250] }}...
    </p>

    <!-- ACTION BUTTONS -->
    <div class="mt-3">

        <form action="/fit" method="post" style="display:inline;">
            <input type="hidden" name="job_id" value="{{ job.job_id }}">
            <button class="btn btn-soft btn-fit">
                <i class="bi bi-person-check"></i> Find My Fit
            </button>
        </form>

        <form action="/skills-gap" method="post" style="display:inline;">
            <input type="hidden" name="job_id" value="{{ job.job_id }}">
            <button class="btn btn-soft btn-skill">
                <i class="bi bi-graph-up"></i> Skills to Improve
            </button>
        </form>

    </div>

</div>
{% endfor %}

</body>
</html>
